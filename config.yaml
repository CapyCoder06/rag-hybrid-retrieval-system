# Pipeline Configuration
# =====================
# This file contains all configurable parameters for the RAG document pipeline.

chunking:
  # Target chunk size in tokens (words)
  chunk_size: 200

  # Overlap between chunks in tokens (words)
  overlap: 50

  # Use NLTK for sentence splitting (requires nltk package)
  use_nltk: true

enrichment:
  # Enable/disable enrichment (generating variations)
  enabled: false

  # Number of variations to generate per document (5-10)
  variations_to_generate: 8

  # Number of top variations to keep per document (limited to 2 for high quality)
  variations_to_keep: 2

validation:
  # Minimum semantic similarity threshold (0.0-1.0)
  # Documents with similarity below this are considered invalid
  semantic_similarity_threshold: 0.65

  # Confidence adjustment weights
  confidence:
    valid_boost: 0.2      # Confidence increase for valid documents
    invalid_penalty: 0.3  # Confidence decrease for invalid documents
    issue_penalty: 0.1    # Additional penalty per validation issue
    warning_penalty: 0.05 # Additional penalty per warning

evaluation:
  # Retrieval evaluation settings
  top_k: [1, 3, 5, 10]  # k values for Recall@k / Precision@k metrics
  relevance_threshold: 0.25  # Auto-assignment threshold (auto-eval only)

retrieval_optimization:
  # Enable query-aligned enhancement for better retrieval
  enabled: false

retrieval:
  # Hybrid scoring weights for retrieval (must sum to 1.0)
  weights:
    text: 0.5           # Text similarity weight (increased for better recall)
    metadata_query: 0.4 # Metadata query match weight (intent matching)
    expanded: 0.1       # Synonym expansion weight

  # Metadata query similarity bonus
  # When metadata query similarity exceeds threshold, apply a boost to that component
  metadata_bonus:
    enabled: true       # Enable metadata similarity bonus
    threshold: 0.6      # Lower threshold for broader applicability
    boost_factor: 1.1   # Very minimal boost to fine-tune ranking

# =========================================
# Stable Retrieval Config (Frozen Version)
# =========================================

retrieval_versions:
  retrieval_v1_stable:
    weights:
      text: 0.5
      metadata_query: 0.4
      expanded: 0.1

    metadata_bonus:
      enabled: true
      threshold: 0.6
      boost_factor: 1.1

# Optional: select active retrieval config version
# If not set, system uses default "retrieval" section above
# retrieval:
#   use_version: retrieval_v1_stable